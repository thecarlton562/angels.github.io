<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Angels Game Finder</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --red: #BA0021;
      --dark-red: #8B0016;
      --navy: #003263;
      --dark: #0a0c10;
      --card: #111418;
      --border: rgba(255,255,255,0.07);
      --text: #e8eaf0;
      --muted: #6b7280;
      --live: #22c55e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding: 24px 16px 48px;
    }

    body::before {
      content: ''; 
      position: fixed;
      top: -120px; left: 50%;
      transform: translateX(-50%);
      width: 700px; height: 400px;
      background: radial-gradient(ellipse, rgba(186,0,33,0.18) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .widget {
      max-width: 460px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }

    .halo-logo {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #d4002a, #8B0016);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      box-shadow: 0 0 24px rgba(186,0,33,0.5);
      flex-shrink: 0;
    }

    .header-text h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 2px;
      color: #fff;
      line-height: 1;
    }

    .header-text p {
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px;
      letter-spacing: 0.5px;
    }

    .refresh-btn {
      margin-left: auto;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 7px 12px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }
    .refresh-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

    .section-label {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
      padding-left: 2px;
    }

    .game-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 18px;
      margin-bottom: 10px;
      transition: border-color 0.2s;
      position: relative;
      overflow: hidden;
    }

    .game-card.live {
      border-color: rgba(34,197,94,0.3);
    }
    .game-card.live::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--live);
      border-radius: 14px 0 0 14px;
    }

    .game-card.has-stream {
      border-color: rgba(186,0,33,0.35);
    }

    .game-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .matchup {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 1.5px;
      color: #fff;
    }

    .matchup .angels {
      color: var(--red);
    }

    .status-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .status-badge.live {
      background: rgba(34,197,94,0.15);
      color: var(--live);
      border: 1px solid rgba(34,197,94,0.3);
      animation: pulse-glow 2s infinite;
    }
    .status-badge.upcoming {
      background: rgba(255,255,255,0.05);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.3); }
      50% { box-shadow: 0 0 0 4px rgba(34,197,94,0); }
    }

    .score {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      letter-spacing: 3px;
      color: #fff;
      margin-bottom: 6px;
    }

    .game-meta {
      display: flex;
      gap: 14px;
      font-size: 12px;
      color: var(--muted);
      flex-wrap: wrap;
      align-items: center;
    }

    .game-meta span { display: flex; align-items: center; gap: 4px; }

    .streams {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .stream-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 11px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      border: 1px solid transparent;
    }

    .stream-pill.subscribed {
      background: rgba(186,0,33,0.15);
      color: #ff6b7a;
      border-color: rgba(186,0,33,0.3);
    }
    .stream-pill.subscribed:hover {
      background: rgba(186,0,33,0.25);
    }

    .stream-pill.national {
      background: rgba(0,50,99,0.4);
      color: #7aafff;
      border-color: rgba(0,50,99,0.6);
    }

    .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

    .no-stream {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
      font-style: italic;
    }

    .divider {
      margin: 20px 0 16px;
    }

    .empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 14px;
    }

    .footer {
      text-align: center;
      margin-top: 28px;
      font-size: 11px;
      color: #3a3f4a;
    }
  </style>
</head>
<body>
<div class="widget">

  <div class="header">
    <div class="halo-logo">😇</div>
    <div class="header-text">
      <h1>Angels Broadcast Finder</h1>
      <p>YOUR STREAMING SERVICES · UPDATED LIVE</p>
    </div>
    <button class="refresh-btn" id="refreshBtn" onclick="refreshScores()">↻ Refresh</button>
  </div>

  <div id="error-msg" style="display:none;text-align:center;margin-bottom:12px;font-size:12px;color:#f87171;"></div>
  <div id="app"></div>

  <div class="footer">Data via MLB · Streams shown for your subscriptions only</div>
</div>

<script>
  const SCHEDULE = [
    {
      id: "apr27", date: "2026-04-27",
      status: "inprogress",
      home: "CWS", away: "LAA",
      localStart: "Mon Apr 27, 4:40 PM PDT",
      streams: [], note: null
    },
    {
      id: "apr28", date: "2026-04-28",
      status: "scheduled",
      home: "CWS", away: "LAA",
      localStart: "Tue Apr 28, 4:40 PM PDT",
      streams: [], note: null
    },
    {
      id: "apr29", date: "2026-04-29",
      status: "scheduled",
      home: "CWS", away: "LAA",
      localStart: "Wed Apr 29, 10:10 AM PDT",
      streams: [], note: null
    },
    {
      id: "may1", date: "2026-05-01",
      status: "scheduled",
      home: "LAA", away: "NYM",
      localStart: "Fri May 1, 9:38 PM PDT",
      streams: [], note: null
    },
    {
      id: "may2", date: "2026-05-02",
      status: "scheduled",
      home: "LAA", away: "NYM",
      localStart: "Sat May 2, 9:38 PM PDT",
      streams: [
        { name: "ESPN+", url: "https://plus.espn.com", type: "subscribed" },
        { name: "YouTube TV", url: "https://tv.youtube.com", type: "subscribed" },
      ],
      note: "ESPN Unlimited / ESPN+"
    },
    {
      id: "may3", date: "2026-05-03",
      status: "scheduled",
      home: "LAA", away: "NYM",
      localStart: "Sun May 3, 1:07 PM PDT",
      streams: [], note: null
    },
    {
      id: "may4", date: "2026-05-04",
      status: "scheduled",
      home: "LAA", away: "CWS",
      localStart: "Mon May 4, 6:38 PM PDT",
      streams: [], note: null
    },
    {
      id: "may5", date: "2026-05-05",
      status: "scheduled",
      home: "LAA", away: "CWS",
      localStart: "Tue May 5, 6:38 PM PDT",
      streams: [], note: null
    },
    {
      id: "may24", date: "2026-05-24",
      status: "scheduled",
      home: "LAA", away: "TEX",
      localStart: "Sun May 24, 4:00 PM PDT",
      streams: [
        { name: "Peacock", url: "https://www.peacocktv.com/sports/mlb", type: "subscribed" },
        { name: "YouTube TV", url: "https://tv.youtube.com", type: "subscribed" },
      ],
      note: "NBC/Peacock Sunday Night Baseball"
    },
  ];

  let liveScores = {};
  let lastUpdated = null;
  const LAA_TEAM_ID = 108;

  async function refreshScores() {
    const btn = document.getElementById("refreshBtn");
    btn.textContent = "↻ Fetching…";
    btn.disabled = true;

    try {
      const today = new Date();
      const start = new Date(today); start.setDate(start.getDate() - 1);
      const end   = new Date(today); end.setDate(end.getDate() + 7);
      const fmt = d => d.toISOString().split("T")[0];

      const url = `https://statsapi.mlb.com/api/v1/schedule?sportId=1&teamId=${LAA_TEAM_ID}`
                + `&startDate=${fmt(start)}&endDate=${fmt(end)}`
                + `&hydrate=linescore,team&fields=dates,date,games,gamePk,status,linescore,teams,away,home,team,abbreviation,score,inning,isTopInning,detailedState`;

      const res  = await fetch(url);
      const data = await res.json();

      liveScores = {};

      for (const dateObj of (data.dates || [])) {
        for (const game of (dateObj.games || [])) {
          const awayAbbr = game.teams?.away?.team?.abbreviation;
          const homeAbbr = game.teams?.home?.team?.abbreviation;
          if (awayAbbr !== "LAA" && homeAbbr !== "LAA") continue;

          const detailedState = game.status?.detailedState || "";
          const abstractState = game.status?.abstractGameState || "";

          let status = "scheduled";
          if (abstractState === "Live" || detailedState.includes("Progress")) status = "inprogress";
          else if (abstractState === "Final" || detailedState.includes("Final")) status = "final";

          const linescore = game.linescore || {};
          const laaIsAway = awayAbbr === "LAA";
          const laaScore  = laaIsAway ? game.teams?.away?.score : game.teams?.home?.score;
          const oppScore  = laaIsAway ? game.teams?.home?.score : game.teams?.away?.score;

          let inning = null;
          if (status === "inprogress" && linescore.currentInning) {
            const half = linescore.isTopInning ? "▲" : "▼";
            inning = \\`${half}\\\` + linescore.currentInning;
          } else if (status === "final") {
            inning = "Final";
            if (linescore.currentInning && linescore.currentInning > 9) {
              inning = \\`F/\\{linescore.currentInning}\`;
            }
          }

          const gameDate = dateObj.date;
          const oppAbbr  = laaIsAway ? homeAbbr : awayAbbr;

          const matched = SCHEDULE.find(s =>
            s.date === gameDate &&
            (s.home === oppAbbr || s.away === oppAbbr)
          );

          if (matched) {
            liveScores[matched.id] = { status, laaScore: laaScore ?? null, oppScore: oppScore ?? null, inning };
          }
        }
      }

      lastUpdated = new Date();
      document.getElementById("error-msg").style.display = "none";
    } catch (err) {
      console.warn("MLB API fetch failed:", err);
      document.getElementById("error-msg").textContent = "⚠️ Could not load scores. Check your connection.";
      document.getElementById("error-msg").style.display = "block";
    }

    btn.textContent = "↻ Refresh";
    btn.disabled = false;
    render();
  }

  function renderGame(g) {
    const live = liveScores[g.id];
    const status = live ? live.status : g.status;
    const isLive = status === "inprogress";
    const isFinal = status === "final";
    const hasStream = g.streams && g.streams.length > 0;
    const oppTeam = g.away === "LAA" ? g.home : g.away;

    let cardClass = "game-card";
    if (isLive) cardClass += " live";
    else if (hasStream) cardClass += " has-stream";

    let scoreHtml = "";
    if ((isLive || isFinal) && live && live.laaScore !== null) {
      const laaScore = live.laaScore ?? 0;
      const oppScore = live.oppScore ?? 0;
      const inningLabel = live.inning ? `<span style=\"font-size:13px;color:var(--muted);margin-left:10px;\">${live.inning}</span>` : "";
      scoreHtml = `<div class=\"score\">${laaScore} – ${oppScore}${inningLabel}</div>`;
    }

    let badgeClass = "upcoming", badgeText = "Upcoming";
    if (isLive)  { badgeClass = "live";  badgeText = "● LIVE"; }
    if (isFinal) { badgeClass = "final"; badgeText = "Final"; }

    let streamsHtml = "";
    if (hasStream) {
      const pills = g.streams.map(s =>
        `<a class=\"stream-pill ${s.type}\" href=\"${s.url}\" target=\"_blank\">
          <span class=\"dot\"></span>${s.name}
        </a>`
      ).join("");
      streamsHtml = `
        <div class=\"streams\">
          ${g.note ? `<span style=\"font-size:11px;color:var(--muted);width:100%;margin-bottom:4px;\">📺 ${g.note}</span>` : ""}
          ${pills}
        </div>`;
    } else {
      streamsHtml = `<div class=\"no-stream\">📡 Regional / local broadcast only (KCAL/FanDuel Sports Network West)</div>`;
    }

    return `
      <div class=\"${cardClass}\">
        <div class=\"game-top\">
          <div class=\"matchup\"><span class=\"angels\">LAA</span> vs ${oppTeam}</div>
          <span class=\"status-badge ${badgeClass}\">${badgeText}</span>
        </div>
        ${scoreHtml}
        <div class=\"game-meta\">
          <span>🕐 ${g.localStart}</span>
          ${g.home === "LAA" ? "<span>🏟 Angel Stadium</span>" : ""}
        </div>
        ${streamsHtml}
      </div>`;
  }

  function render() {
    const liveGames  = SCHEDULE.filter(g => (liveScores[g.id]?.status ?? g.status) === "inprogress");
    const finalGames = SCHEDULE.filter(g => (liveScores[g.id]?.status ?? g.status) === "final");
    const upcoming   = SCHEDULE.filter(g => (liveScores[g.id]?.status ?? g.status) === "scheduled");
    const streamable = upcoming.filter(g => g.streams && g.streams.length > 0);
    const noStream   = upcoming.filter(g => !g.streams || g.streams.length === 0);

    let html = "";

    if (liveGames.length) {
      html += `<div class=\"section-label\">🔴 Live Now</div>`;
      liveGames.forEach(g => html += renderGame(g));
      html += `<div class=\"divider\"></div>`;
    }

    if (finalGames.length) {
      html += `<div class=\"section-label\">✔ Final</div>`;
      finalGames.forEach(g => html += renderGame(g));
      html += `<div class=\"divider\"></div>`;
    }

    if (streamable.length) {
      html += `<div class=\"section-label\">✅ Upcoming — On Your Services</div>`;
      streamable.forEach(g => html += renderGame(g));
      html += `<div class=\"divider\"></div>`;
    }

    if (noStream.length) {
      html += `<div class=\"section-label\">📡 Upcoming — Regional Only</div>`;
      noStream.forEach(g => html += renderGame(g));
    }

    if (!SCHEDULE.length) {
      html = `<div class=\"empty\">No upcoming Angels games found.</div>`;
    }

    if (lastUpdated) {
      html += `<div style=\"text-align:center;margin-top:16px;font-size:11px;color:#3a3f4a;\">Scores updated ${lastUpdated.toLocaleTimeString()}</div>`;
    }

    document.getElementById("app").innerHTML = html;
  }

  const style = document.createElement("style");
  style.textContent = \".status-badge.final { background: rgba(255,255,255,0.05); color: #9ca3af; border: 1px solid rgba(255,255,255,0.1); }\";
  document.head.appendChild(style);

  render();
  refreshScores();
</script>
</body>
</html>
